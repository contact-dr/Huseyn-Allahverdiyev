<body>

<!-- PARTICLES -->

<!-- 3D Tooth -->

<!-- THREE.JS -->
https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js

<script>
/* ---------------------- 3D ROTATING TOOTH ---------------------- */
const canvas = document.getElementById("tooth3d");
const renderer = new THREE.WebGLRenderer({ canvas, alpha: true });
renderer.setSize(canvas.clientWidth, canvas.clientHeight);
renderer.setPixelRatio(window.devicePixelRatio);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(35, canvas.clientWidth / canvas.clientHeight, 0.1, 100);
camera.position.z = 5;

/* Light */
const light = new THREE.DirectionalLight(0xffffff, 1.5);
light.position.set(2, 2, 3);
scene.add(light);

/* Simple tooth-like shape (rounded extrusion) */
const shape = new THREE.Shape();
shape.absarc(0, 0, 1.0, 0, Math.PI * 2, false);

const extrudeSettings = {
    steps: 2,
    depth: 0.9,
    bevelEnabled: true,
    bevelThickness: 0.3,
    bevelSize: 0.3,
    bevelSegments: 5
};

const geometry = new THREE.ExtrudeGeometry(shape, extrudeSettings);
const material = new THREE.MeshPhongMaterial({
    color: 0xffffff,
    shininess: 200,
    specular: 0xeeeeee
});

const tooth = new THREE.Mesh(geometry, material);
scene.add(tooth);

/* Animation */
function animate() {
    tooth.rotation.x += 0.005;
    tooth.rotation.y += 0.01;

    renderer.render(scene, camera);
    requestAnimationFrame(animate);
}
animate();

/* Resize fix */
window.addEventListener("resize", () => {
    renderer.setSize(canvas.clientWidth, canvas.clientHeight);
    camera.aspect = canvas.clientWidth / canvas.clientHeight;
    camera.updateProjectionMatrix();
});
</script>

<script>
/* ---------------------- PARTICLE BACKGROUND ---------------------- */
const pCanvas = document.getElementById("particles");
const ctx = pCanvas.getContext("2d");

pCanvas.width = window.innerWidth;
pCanvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 80; i++) {
    particles.push({
        x: Math.random() * pCanvas.width,
        y: Math.random() * pCanvas.height,
        r: Math.random() * 3 + 1,
        dx: (Math.random() - 0.5) * 0.4,
        dy: (Math.random() - 0.5) * 0.4
    });
}

function drawParticles() {
    ctx.clearRect(0, 0, pCanvas.width, pCanvas.height);
    particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255,255,255,0.7)";
        ctx.fill();

        p.x += p.dx;
        p.y += p.dy;

        if (p.x < 0 || p.x > pCanvas.width) p.dx *= -1;
        if (p.y < 0 || p.y > pCanvas.height) p.dy *= -1;
    });

    requestAnimationFrame(drawParticles);
}
drawParticles();

/* Resize */
window.addEventListener("resize", () => {
    pCanvas.width = window.innerWidth;
    pCanvas.height = window.innerHeight;
});
</script>

</body>
